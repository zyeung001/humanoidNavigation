# Ablation pilot: TREATMENT condition.
#
# Override of config/training_config.yaml -> walking section. Use with:
#   py -3.13 scripts/train_walking.py \
#       --config config/training_config.yaml \
#       --override config/ablation/heading_pelvis.yaml \
#       --from-standing --model models/best_standing_model.zip \
#       --standing-vecnorm models/vecnorm.pkl
#
# This is the TREATMENT for the waist-twist paper: pelvis-based yaw reward.
# The hypothesis is that switching the reward signal from torso to pelvis
# eliminates the waist-twist hack -- forcing the agent to rotate the lower
# body to satisfy the yaw command rather than just twisting at the chest.
walking:
  xml_file: null

  # The toggle under study.
  heading_source: pelvis

  total_timesteps: 10000000

  seed: 1
  log_dir: data/logs/ablation/treatment_pelvis_seed1
  checkpoint_dir: data/checkpoints/ablation/treatment_pelvis_seed1
  checkpoint_prefix: treatment_pelvis
  best_model_path: models/ablation/treatment_pelvis_best
  final_model_path: models/ablation/treatment_pelvis_final
  vecnormalize_path: models/ablation/treatment_pelvis_vecnorm.pkl

  use_wandb: false
  video_freq: 0
