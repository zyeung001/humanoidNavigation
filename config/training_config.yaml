
standing:
  # ========== ENVIRONMENT CONFIGURATION ==========
  
  # Basic settings
  seed: 42
  n_envs: 12  # Parallel environments
  device: cuda  # 'cuda' or 'cpu'
  
  # Episode settings
  max_episode_steps: 10000 
  
  # ========== OBSERVATION PROCESSING ==========
  # Enhanced observations for better state estimation
  
  obs_history: 4  # Stack 4 frames for temporal information
  obs_include_com: true  # Include center-of-mass features
  obs_feature_norm: true  # Normalize features with tanh
  
  # ========== ACTION PREPROCESSING ==========
  
  action_smoothing: true
  action_smoothing_tau: 0.5
  
  action_symmetry: false  # Don't enforce left-right symmetry
  pd_assist: false  # No PD control assistance
  
  # ========== CURRICULUM LEARNING ==========
  curriculum_start_stage: 0
  curriculum_max_stage: 4  
  curriculum_advance_after: 20  # Episodes before considering advancement
  curriculum_success_rate: 0.60  # Success rate needed to advance
  
  
  # ========== DOMAIN RANDOMIZATION ==========
  
  domain_rand: true
  rand_mass_range: [0.95, 1.05]  
  rand_friction_range: [0.95, 1.05]  
  
  # ========== REWARD FUNCTION  ==========
  target_height: 1.40
  height_error_threshold: 0.08
  height_stability_threshold: 0.15
  

  reward_caps:
    max_height_maintenance_penalty: 15.0  
    recovery_bonus_scale: 50.0  
    termination_penalty_constant: 50.0  
  
  # ========== PPO HYPERPARAMETERS ==========
  
  # Training schedule
  total_timesteps: 5_000_000
  learning_rate: 0.0003
  final_learning_rate: 0.00005  # Linear decay
  
  # PPO algorithm parameters
  n_steps: 2048  # Steps per environment per update
  batch_size: 256  # Minibatch size
  n_epochs: 10  # Gradient steps per update
  
  gamma: 0.995  # Discount factor (long horizon for standing)
  gae_lambda: 0.95  # GAE parameter
  
  # Policy optimization
  clip_range: 0.2
  final_clip_range: 0.1  # Linear decay
  
  # Entropy regularization
  ent_coef: 0.02  # Initial exploration
  final_ent_coef: 0.005  # Final exploitation
  
  # Value function
  vf_coef: 0.5
  
  # Gradient clipping
  max_grad_norm: 0.5
  
  # ========== VECNORMALIZE CONFIGURATION ==========
  
  normalize: true
  vecnormalize_clip_obs: 50.0 
  vecnormalize_clip_reward: 50.0  
  
  
  # ========== NETWORK ARCHITECTURE ==========
  
  policy_kwargs:
    net_arch:
      - pi: [512, 512, 256]  # Policy network
        vf: [512, 512, 256]  # Value network
    activation_fn: SiLU  # Smooth activation (better than ReLU)
    ortho_init: true  # Orthogonal initialization
  
  # ========== LOGGING & CHECKPOINTING ==========
  
  verbose: 1
  
  log_dir: data/logs
  use_tensorboard: true
  
  # Evaluation
  n_eval_episodes: 5
  eval_freq: 100_000  # Every 100k steps
  
  # Checkpointing
  save_freq: 250_000  # Every 250k steps
  checkpoint_dir: data/checkpoints
  checkpoint_prefix: standing
  
  # Model saving
  best_model_path: models/best_standing_model
  final_model_path: models/final_standing_model
  vecnormalize_path: models/vecnorm.pkl
  
  # Success thresholds
  target_reward_threshold: 5000
  
  # Early stopping
  early_stop:
    patience: 5  # Number of consecutive successes needed
  
  # ========== ADVANCED OPTIONS ==========
  
  # Random height initialization for recovery training
  random_height_init: true  
  random_height_prob: 0.3  # 30% of episodes start at random height
  random_height_range: [-0.3, 0.1]  # Mostly downward perturbations
  
  # This forces the agent to experience and recover from low heights
  # even when curriculum is at high stages
  
  # WandB logging 
  use_wandb: false
  wandb_project: humanoid_standing
  wandb_log_freq: 10000
  video_freq: 500000  # Record video every 500k steps
  episode_print_freq: 1000


# ============================================================================
# WALKING CONFIGURATION
# ============================================================================

walking:
  # ========== ENVIRONMENT CONFIGURATION ==========
  
  # Basic settings
  seed: 42
  n_envs: 12  
  device: cuda  # 'cuda' or 'cpu'
  
  # Episode settings
  max_episode_steps: 5000
  
  # ========== OBSERVATION PROCESSING ==========
  # Walking uses same obs processing as standing + velocity commands
  
  obs_history: 4  # Stack 4 frames for temporal information
  obs_include_com: true  # Include center-of-mass features (+6 dims)
  obs_feature_norm: true  # Normalize features with tanh
  # Note: Walking adds +2 dims for commanded velocity
  # Total: (365 + 6 + 2) * 4 = 1492 dims
  
  # ========== ACTION PREPROCESSING ==========
  
  action_smoothing: true
  action_smoothing_tau: 0.08  # REDUCED: Faster reactions during walking gait
  
  action_symmetry: false
  pd_assist: false
  
  # ========== WALKING-SPECIFIC ==========
  
  velocity_weight: 5.0  # Moderate weight for stability
  max_commanded_speed: 0.30  # Starting speed (curriculum controls this)

  # Speed curriculum stages (m/s) - sized for ~2ft (0.6m) humanoid sim-to-real
  # Stage 0 at 0.15 m/s: discoverable from standing via shuffling/leaning
  # Stage 0 at 0.3 required a real gait — too hard for PPO to discover from standing
  curriculum_max_speed_stages: [0.15, 0.3, 0.6, 1.0]
  
  # ========== VELOCITY COMMAND GENERATOR  ==========
  use_command_generator: true        # Use VelocityCommandGenerator
  command_switch_interval: [10.0, 20.0]  # LONGER intervals for Stage 0 learning
  stop_probability: 0.0              # NO stop commands - don't reward standing
  
  # ========== YAW RATE TRACKING  ==========
  include_yaw_rate: true             # Enable yaw rate tracking in observation/reward
  max_yaw_rate: 1.0                  # rad/s maximum commanded yaw rate
  yaw_rate_weight: 0.5               # Reward weight for yaw tracking (was 3.0 - too much free reward for standing)
  
  # ========== CURRICULUM LEARNING ==========
  curriculum_start_stage: 0
  curriculum_max_stage: 3
  curriculum_advance_after: 15    # Episodes before considering advancement
  warmup_episodes: 0              # NO warmup leniency - enforce strict criteria
  curriculum_success_rate: 0.35   # Success rate needed to advance

  # Direction diversity - DISABLED for Stage 0 (forward only)
  direction_diversity: false
  
  # ========== ROBUSTNESS TRAINING (STAGE-CONTROLLED) ==========
  # Push perturbations DISABLED for Stage 0
  # Curriculum now controls these settings per-stage
  push_enabled: false            # Start disabled, curriculum enables
  push_interval: 250
  push_magnitude_range: [30.0, 100.0]
  push_duration: 4
  
  # ========== DOMAIN RANDOMIZATION ==========
  
  domain_rand: false  # Start without, curriculum enables in later stages
  rand_mass_range: [0.97, 1.03]  # Gentler initially
  rand_friction_range: [0.97, 1.03]  
  
  # Random height initialization - DISABLED for Stage 0
  random_height_init: false      # Start disabled
  random_height_prob: 0.0        # No perturbations initially
  random_height_range: [-0.25, 0.1]
  
  # Velocity perturbations at reset
  random_velocity_init: false    # Disabled for Stage 0
  random_velocity_range: [-0.3, 0.3]
  
  # ========== FIX: RELAXED TERMINATION FOR WALKING ==========
  # Issue: Height drops during natural gait shouldn't terminate
  # Solution: Lower threshold, longer grace period, extended early protection
  termination_height_threshold: 0.60      # LOWERED: Allow natural gait oscillation (0.70 was too strict)
  termination_grace_period: 100           # Steps to track before terminating
  termination_height_recovery_window: 80  # Full gait cycle (~0.8s at 100Hz)
  early_termination_protection: 150       # Protect first 1.5s (~2 gait cycles)
  
  # ========== REWARD FUNCTION ==========
  target_height: 1.40
  height_error_threshold: 0.15
  height_stability_threshold: 0.20

  reward_caps:
    max_height_maintenance_penalty: 0.8   # FIX: Reduced from 8.0 (10x)
    recovery_bonus_scale: 5.0             # FIX: Reduced from 50.0 (10x)
    termination_penalty_constant: 2.5     # FIX: Reduced from 25.0 (10x)

  # ========== PPO HYPERPARAMETERS ==========

  # Training schedule
  total_timesteps: 30_000_000
  learning_rate: 0.000005        # FIX: 3e-5 caused 95.8% clip fraction for 5M steps. 5e-6 keeps steps within clip boundary.
  final_learning_rate: 0.000003

  # PPO algorithm parameters
  n_steps: 2048
  batch_size: 24576              # Full buffer (12 envs × 2048 steps). 1 minibatch/epoch → 3 total gradient steps.
                                 # Previous: 2048 → 12 minibatches × 3 epochs = 36 steps → 95.8% clip fraction (no signal).
                                 # Now: 1 × 3 = 3 steps → policy barely moves → clip fraction drops → optimizer gets real gradient.
  n_epochs: 3                    # With full-batch: 3 gradient steps per cycle (not 36).
  # target_kl not used: VFWarmup callback provides stability during transfer.
  # target_kl stops ALL learning (policy AND value) — VFWarmup is the real mechanism.

  gamma: 0.995
  gae_lambda: 0.95

  # Policy optimization
  clip_range: 0.3                    # FIX: 0.2 too tight for 17-dim action space — 98.5% clip fraction. 0.3 lets more gradient through.
  final_clip_range: 0.3              # No decay.

  # Entropy regularization
  ent_coef: 0.005                # Low: let policy converge before encouraging exploration
  final_ent_coef: 0.003          # Minimal final entropy
  
  # Value function
  vf_coef: 0.5
  
  # Gradient clipping
  max_grad_norm: 0.5

  # Value function warmup (standing → walking transfer)
  vf_warmup_steps: 250000        # Phase 1: policy frozen, VF trains
  vf_rampup_steps: 500000        # Phase 2: policy scale ramps 0→max_scale over 500k steps
  policy_max_scale: 0.5          # Phase 3: permanent policy scaling. With 17 action dims, full-speed
                                 # updates overshoot clip boundary at ANY LR. 0.5 = 50% of each
                                 # optimizer step is applied. VF always gets full updates.
                                 # 0.3 was too conservative with full-batch — optimizer gets real signal now.
  extra_vf_epochs: 7             # Extra VF-only gradient steps after each PPO train() call.
                                 # Full-batch (batch_size=24576) gives only 3 gradient steps per cycle.
                                 # Clipping only affects policy loss — VF loss is plain MSE. But with
                                 # only 3 steps, the VF can't keep up (EV declined 0.50 → 0.36 over 2M
                                 # steps). 7 extra epochs → 10 total VF steps per cycle. Previous
                                 # successful run had 36 VF steps (batch_size=2048, 12 minibatches × 3).

  # ========== VECNORMALIZE CONFIGURATION ==========

  normalize: true
  vecnormalize_clip_obs: 10.0
  vecnormalize_clip_reward: 10.0

  # ========== NETWORK ARCHITECTURE ==========
  
  policy_kwargs:
    net_arch:
      - pi: [512, 512, 256]
        vf: [512, 512, 256]
    activation_fn: SiLU
    ortho_init: true
  
  # ========== LOGGING & CHECKPOINTING ==========
  
  verbose: 1
  
  log_dir: data/logs/walking
  use_tensorboard: true
  
  # Evaluation
  n_eval_episodes: 5
  eval_freq: 100_000
  
  # Checkpointing
  save_freq: 250_000
  checkpoint_dir: data/checkpoints/walking
  checkpoint_prefix: walking
  
  # Model saving
  best_model_path: models/best_walking_model
  final_model_path: models/final_walking_model
  vecnormalize_path: models/vecnorm_walking.pkl
  
  # Success thresholds
  target_reward_threshold: 3000
  velocity_error_threshold: 0.5  
  
  # Early stopping
  early_stop:
    patience: 5
  
  # ========== REWARD FUNCTION COMPONENTS ==========
  # FIX: All rewards scaled down by 10x to bring episode rewards to ~500 (was ~5000)
  # This is CRITICAL for PPO stability - high rewards caused KL divergence explosion

  # Velocity tracking (Gaussian kernel)
  reward_tracking_weight: 5.0     # Doubled: make tracking overwhelmingly dominant over survival rewards
  reward_tracking_bandwidth: 10.0  # FIX: 20.0 created near-binary reward (zero for error>0.15), causing high advantage variance and KL=32k. 10.0 gives smoother gradient.

  # Direction/progress bonus
  reward_direction_weight: 0.8    # FIX: Reduced from 8.0 (10x)

  # Stability rewards
  reward_height_weight: 0.3       # FIX: Reduced from 3.0 (10x)
  reward_upright_weight: 0.2      # FIX: Reduced from 2.0 (10x)
  reward_alive_weight: 0.05       # FIX: Reduced from 0.5 (10x)

  # Penalties (keep small)
  reward_action_penalty: 0.0003   # FIX: Reduced from 0.003 (10x)
  reward_jerk_penalty: 0.0         # Removed: noise source, jerk penalty fights against gait discovery
  reward_arm_posture_weight: 0.8   # Target weight — ramped from 0 → 0.8 over arm_penalty_ramp_steps.
                                   # At full weight: -0.7 to -2.9/step. Ramp prevents this from fighting gait discovery.
  arm_penalty_ramp_steps: 2000000  # Linearly ramp arm penalty from 0 → target over 2M global steps.
                                   # Lets policy walk first, then gradually correct arm posture.

  # Consistency reward
  reward_consistency_weight: 0.0  # Removed: noise source (17 components → 6). Re-add after walking is learned.
  reward_consistency_window: 100
  # WandB logging 
  use_wandb: true
  wandb_project: humanoid_walking
  wandb_log_freq: 5000
  video_freq: 500000
  episode_print_freq: 1000


# ============================================================================
# MAZE NAVIGATION CONFIGURATION
# ============================================================================

maze:
  # ========== MAZE ENVIRONMENT ==========
  cell_size: 2.0              # World-space cell size (meters)
  wall_height: 2.5            # Wall height (meters, > humanoid 1.4m)
  goal_threshold: 0.5         # Distance to goal to count as reached (meters)
  max_episode_steps: 10000    # Max steps per episode

  # ========== OBSERVATION ==========
  nav_obs_type: "minimal"     # 6 dims: goal_dx, goal_dy, goal_dist, goal_angle, wall_front, wall_left

  # ========== TRAINING MODE ==========
  hierarchical: true          # true=freeze walking, train nav; false=end-to-end
  walking_model_path: "models/walking/best/model.zip"
  walking_vecnorm_path: "models/walking/best/vecnorm.pkl"

  # ========== PPO HYPERPARAMETERS ==========
  total_timesteps: 50_000_000
  n_envs: 8
  learning_rate: 0.0003
  final_learning_rate: 0.00005
  batch_size: 256
  n_steps: 2048
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  seed: 42

  # ========== CURRICULUM ==========
  curriculum_start_stage: 0
  curriculum_max_stage: 6
  curriculum_window_size: 30
  curriculum_success_rate: 0.40

  # ========== LOGGING ==========
  use_wandb: false
  wandb_project: humanoid_maze
  log_dir: data/logs/maze
