
standing:
  # ========== ENVIRONMENT CONFIGURATION ==========
  
  # Basic settings
  seed: 42
  n_envs: 12  # Parallel environments
  device: cuda  # 'cuda' or 'cpu'
  
  # Episode settings
  max_episode_steps: 10000 
  
  # ========== OBSERVATION PROCESSING ==========
  # Enhanced observations for better state estimation
  
  obs_history: 4  # Stack 4 frames for temporal information
  obs_include_com: true  # Include center-of-mass features
  obs_feature_norm: true  # Normalize features with tanh
  
  # ========== ACTION PREPROCESSING ==========
  
  action_smoothing: true
  action_smoothing_tau: 0.5
  
  action_symmetry: false  # Don't enforce left-right symmetry
  pd_assist: false  # No PD control assistance
  
  # ========== CURRICULUM LEARNING ==========
  curriculum_start_stage: 0
  curriculum_max_stage: 4  
  curriculum_advance_after: 20  # Episodes before considering advancement
  curriculum_success_rate: 0.60  # Success rate needed to advance
  
  
  # ========== DOMAIN RANDOMIZATION ==========
  
  domain_rand: true
  rand_mass_range: [0.95, 1.05]  
  rand_friction_range: [0.95, 1.05]  
  
  # ========== REWARD FUNCTION  ==========
  target_height: 1.40
  height_error_threshold: 0.08
  height_stability_threshold: 0.15
  

  reward_caps:
    max_height_maintenance_penalty: 15.0  
    recovery_bonus_scale: 50.0  
    termination_penalty_constant: 50.0  
  
  # ========== PPO HYPERPARAMETERS ==========
  
  # Training schedule
  total_timesteps: 5_000_000
  learning_rate: 0.0003
  final_learning_rate: 0.00005  # Linear decay
  
  # PPO algorithm parameters
  n_steps: 2048  # Steps per environment per update
  batch_size: 256  # Minibatch size
  n_epochs: 10  # Gradient steps per update
  
  gamma: 0.995  # Discount factor (long horizon for standing)
  gae_lambda: 0.95  # GAE parameter
  
  # Policy optimization
  clip_range: 0.2
  final_clip_range: 0.1  # Linear decay
  
  # Entropy regularization
  ent_coef: 0.02  # Initial exploration
  final_ent_coef: 0.005  # Final exploitation
  
  # Value function
  vf_coef: 0.5
  
  # Gradient clipping
  max_grad_norm: 0.5
  
  # ========== VECNORMALIZE CONFIGURATION ==========
  
  normalize: true
  vecnormalize_clip_obs: 50.0 
  vecnormalize_clip_reward: 50.0  
  
  
  # ========== NETWORK ARCHITECTURE ==========
  
  policy_kwargs:
    net_arch:
      - pi: [512, 512, 256]  # Policy network
        vf: [512, 512, 256]  # Value network
    activation_fn: SiLU  # Smooth activation (better than ReLU)
    ortho_init: true  # Orthogonal initialization
  
  # ========== LOGGING & CHECKPOINTING ==========
  
  verbose: 1
  
  log_dir: data/logs
  use_tensorboard: true
  
  # Evaluation
  n_eval_episodes: 5
  eval_freq: 100_000  # Every 100k steps
  
  # Checkpointing
  save_freq: 250_000  # Every 250k steps
  checkpoint_dir: data/checkpoints
  checkpoint_prefix: standing
  
  # Model saving
  best_model_path: models/best_standing_model
  final_model_path: models/final_standing_model
  vecnormalize_path: models/vecnorm.pkl
  
  # Success thresholds
  target_reward_threshold: 5000
  
  # Early stopping
  early_stop:
    patience: 5  # Number of consecutive successes needed
  
  # ========== ADVANCED OPTIONS ==========
  
  # Random height initialization for recovery training
  random_height_init: true  
  random_height_prob: 0.3  # 30% of episodes start at random height
  random_height_range: [-0.3, 0.1]  # Mostly downward perturbations
  
  # This forces the agent to experience and recover from low heights
  # even when curriculum is at high stages
  
  # WandB logging 
  use_wandb: false
  wandb_project: humanoid_standing
  wandb_log_freq: 10000
  video_freq: 500000  # Record video every 500k steps
  episode_print_freq: 1000


# ============================================================================
# WALKING CONFIGURATION
# ============================================================================

walking:
  # ========== ENVIRONMENT CONFIGURATION ==========
  
  # Basic settings
  seed: 42
  n_envs: 12  
  device: cuda  # 'cuda' or 'cpu'
  
  # Episode settings
  max_episode_steps: 5000
  
  # ========== OBSERVATION PROCESSING ==========
  # Walking uses same obs processing as standing + velocity commands
  
  obs_history: 4  # Stack 4 frames for temporal information
  obs_include_com: true  # Include center-of-mass features (+6 dims)
  obs_feature_norm: true  # Normalize features with tanh
  # Note: Walking adds 11-dim command block (cmd, actual, error for vx/vy/yaw)
  # Total: (365 + 6) * 4 + 11 = 1495 dims
  
  # ========== ACTION PREPROCESSING ==========
  
  action_smoothing: true
  action_smoothing_tau: 0.08  # REDUCED: Faster reactions during walking gait
  
  action_symmetry: false
  pd_assist: false
  
  # ========== WALKING-SPECIFIC ==========
  
  velocity_weight: 5.0  # Moderate weight for stability
  max_commanded_speed: 0.30  # Starting speed (curriculum controls this)

  # Speed curriculum stages (m/s) - sized for ~2ft (0.6m) humanoid sim-to-real
  # Froude scaling: sim 1.5 m/s ≈ real 1.0 m/s for 0.6m robot
  curriculum_max_speed_stages: [0.15, 0.3, 0.6, 1.0]  # b91a244 VERBATIM (the committed working
                                                      # walker). Stage-0=0.15 m/s: low enough for PPO
                                                      # to discover forward gait from the standing
                                                      # prior. The 9b3d2b6 "0.3 is the working speed"
                                                      # note was the falsified contamination thesis;
                                                      # b91a244 (the actual working model) used 0.15.

  # Arm penalty gating: weight per curriculum stage (ramps smoothly between stages)
  arm_penalty_stage_weights: [0.0, 0.5, 0.7, 0.7, 1.0]  # Stage 3 keeps 0.7 — don't change arm penalty during robustness training
  arm_penalty_ramp_rate: 0.000002  # Per-step ramp toward stage target (slower)
  
  # ========== VELOCITY COMMAND GENERATOR  ==========
  use_command_generator: true        # Use VelocityCommandGenerator
  command_switch_interval: [10.0, 20.0]  # RESTORED (9b3d2b6): long stable commands so Stage-0
                                         # can actually learn to track. The [3,8] churn was a
                                         # yaw-era change; yaw/TIP is deferred to later stages now.
  stop_probability: 0.0              # NO stop commands - don't reward standing
  
  # ========== YAW RATE TRACKING  ==========
  include_yaw_rate: true             # Enable yaw rate tracking in observation/reward
  max_yaw_rate: 1.0                  # rad/s maximum commanded yaw rate
  yaw_rate_weight: 1.5               # Lowered 3.0→1.5 (5/16): at Stage-0 yaw_cmd≈0, a non-turning
                                     # agent banks ~full yaw reward regardless of behavior — a large
                                     # behavior-independent floor that dilutes the tracking gradient.
                                     # (Originally 1.5: must be competitive with tracking 5.0.)
                                     # At 1.5, agent earned 3x more from walking straight than turning.
                                     # 3.0 makes yaw ~60% of tracking weight — strong enough to matter.
  reward_yaw_bandwidth: 10.0         # Gaussian sharpness for yaw tracking: exp(-bw * err²).
                                     # Old hardcoded 4.0 was too soft — agent retained 91% reward at
                                     # 0.15 rad/s error. At 10.0: err=0.15→80%, err=0.3→41%.

  # ========== FEET AIR TIME (enables rotation) ==========
  feet_air_time_weight: 0.5          # CHANGED: Now continuous (per-step, not sparse landing-only).
                                     # Lower weight because it fires every step (was 1.0 sparse).
                                     # At 0.5, max per-step = 1.0 (both feet airborne). Enough to
                                     # encourage stepping without dominating tracking.

  # ========== CURRICULUM LEARNING ==========
  curriculum_start_stage: 0          # Restart from Stage 0 — re-learn walking with yaw from scratch
  curriculum_max_stage: 3            # Unlocks full yaw range (+/-1.0 rad/s at Stage 3).
                                     # Was capped at 1 — agent never trained on yaw > 0.5.
  curriculum_advance_after: 30    # Episodes before considering advancement
  warmup_episodes: 0              # NO warmup leniency - enforce strict criteria
  curriculum_success_rate: 0.50   # Success rate needed to advance

  # Direction diversity - DISABLED: policy walks forward only, yaw handles turning
  direction_diversity: false
  
  # ========== ROBUSTNESS TRAINING (STAGE-CONTROLLED) ==========
  # Push perturbations DISABLED for Stage 0
  # Curriculum now controls these settings per-stage
  push_enabled: false            # Start disabled, curriculum enables
  push_interval: 250
  push_magnitude_range: [30.0, 100.0]
  push_duration: 4
  
  # ========== DOMAIN RANDOMIZATION ==========
  
  domain_rand: false  # Start without, curriculum enables in later stages
  rand_mass_range: [0.97, 1.03]  # Gentler initially
  rand_friction_range: [0.97, 1.03]  
  
  # Random height initialization - DISABLED for Stage 0
  random_height_init: false      # Start disabled
  random_height_prob: 0.0        # No perturbations initially
  random_height_range: [-0.25, 0.1]
  
  # Velocity perturbations at reset
  random_velocity_init: false    # Disabled for Stage 0
  random_velocity_range: [-0.3, 0.3]
  
  # ========== FIX: RELAXED TERMINATION FOR WALKING ==========
  # Issue: Height drops during natural gait shouldn't terminate
  # Solution: Lower threshold, longer grace period, extended early protection
  # With --reinit-action-head the agent starts collapsed; a long protection
  # window + low threshold turned into a "crawl incubator" (ep_len pinned to
  # exactly early_termination_protection at height ~0.47, farming the survival
  # floor). Collapse must stop paying fast so PPO uses the transferred body
  # encoder's standing posture instead. Same principle as the nav crawl fix.
  # b91a244 VERBATIM. The 0.85 / 30 / 40 "crawl incubator" tightening was a
  # nav-era change; combined with raised Stage-0 speed it killed episodes at
  # ~99 steps before forward gait could be discovered (the observed Stage-0
  # trap). b91a244's longer protection window IS the proven setting.
  termination_height_threshold: 0.60      # b91a244 verbatim
  termination_grace_period: 100           # Steps to track before terminating
  termination_height_recovery_window: 80  # b91a244 verbatim
  early_termination_protection: 150       # b91a244 verbatim — time-on-task to find gait
  
  # ========== REWARD FUNCTION ==========
  target_height: 1.40
  height_error_threshold: 0.15
  height_stability_threshold: 0.20

  # Transfer runs inherit balance from the standing prior, so keep this at 1.0
  # — a higher survival scale recreates the floor that competes with tracking
  # (memory: tracking must dominate survival). The 1.5 from-scratch experiment
  # was abandoned (from-scratch falsified 5/16: plateaued shaky non-walker).
  height_reward_scale: 1.0

  reward_caps:
    max_height_maintenance_penalty: 0.8   # FIX: Reduced from 8.0 (10x)
    recovery_bonus_scale: 5.0             # FIX: Reduced from 50.0 (10x)
    termination_penalty_constant: 2.5     # FIX: Reduced from 25.0 (10x)

  # ========== PPO HYPERPARAMETERS ==========

  # Training schedule
  total_timesteps: 30_000_000
  # ===== PORTED VERBATIM FROM COMMIT b91a244 (5/16/2026) =====
  # b91a244 = "Added walking model" (3/13/2026), the commit that demonstrably
  # committed a working walker. Its CODE can't run here (March loader segfaults
  # on Python 3.13 / numpy 2.x), so we run the Py3.13-safe CURRENT code with
  # b91a244's EXACT proven walking hyperparameters. The 9b3d2b6/contamination
  # "restore" (3e-4/256/10/0.05) was the false thesis that failed 3× — those
  # were the STANDING section's values, never the walking recipe. Do not "restore".
  learning_rate: 0.000005         # b91a244 verbatim. 3e-5 caused 95.8% clip; 5e-6 fits clip boundary.
  final_learning_rate: 0.000003   # b91a244 verbatim.

  # PPO algorithm parameters
  n_steps: 2048
  batch_size: 24576              # b91a244 verbatim. Full buffer (12 envs × 2048): 1 minibatch/epoch.
  n_epochs: 3                    # b91a244 verbatim. Full-batch → 3 grad steps/cycle (not 36).
  # target_kl not used: VFWarmup callback provides stability during transfer.

  gamma: 0.995
  gae_lambda: 0.95

  # Policy optimization
  clip_range: 0.3                    # b91a244 verbatim. 0.2 too tight for 17-dim (98.5% clip).
  final_clip_range: 0.3              # b91a244 verbatim. No decay.

  # Entropy regularization
  ent_coef: 0.005                # b91a244 verbatim. Low: converge before exploring.
  final_ent_coef: 0.003          # b91a244 verbatim.

  # 0.0 for from-standing transfer (std=1.0). The 5/16 hypothesis that std=1.65
  # was safe once policy-scaling was removed was FALSIFIED by the 5M run on
  # 5/16: policy_max_scale=1.0 (no scaling) + log_std_max=0.5 → std=1.65 →
  # approx_kl=34922, clip=0.9, policy destroyed every update, height 1.40→1.23,
  # 0% success flat for 5M steps. The KL explosion is the 17-dim × high-std
  # interaction, NOT a scaling artifact. train_walking.py:1144 agrees:
  # 0.0 for transfer, 0.5 only for true from-scratch fresh training.
  log_std_max: 0.0
  
  # Value function
  vf_coef: 0.5
  
  # Gradient clipping
  max_grad_norm: 0.5

  # Value function warmup (standing → walking transfer)
  vf_warmup_steps: 250000        # b91a244 verbatim (Phase 1: policy frozen, VF trains).
  vf_rampup_steps: 500000        # b91a244 verbatim (Phase 2: scale 0→max over 500k).
  policy_max_scale: 0.5          # 5/16 (3rd run): policy_max_scale=1.0 + VF-warmup STILL
                                 # gave clip=0.9 / pg_loss +0.26 / KL~1e6 at steady (516k,
                                 # EV=0.93). Signature invariant across log_std, warmup,
                                 # scaling-off → confirms MEMORY.md root cause #6: 17-dim
                                 # action space is a STRUCTURAL clip problem, permanent
                                 # policy scaling REQUIRED (no LR/config fix exists). The
                                 # 9b3d2b6/contamination "no-scaling works" thesis failed 3×
                                 # today. Reverting to the most-evidenced working mechanism:
                                 # VF-warmup (Phase 1) + permanent 0.5 scaling (Phase 3).
                                 # NOTE prior comment kept for history:
                                 # 0/0/1.0 + log_std_max=0.0 gave approx_kl=1.4M, clip=0.9,
                                 # standing-prior trap (ep_len 258, 0% walk, EV=0.90). Cause:
                                 # --from-standing RE-INITS the value function → garbage
                                 # advantages on early updates → 960 grad-steps/rollout hurls
                                 # the policy into the clip-saturated standing basin. Phase 1
                                 # (freeze policy, train VF to accuracy) is the documented cure
                                 # for exactly this and is SEPARATE from the permanent 0.5
                                 # policy scaling that genuinely crippled learning. Keep
                                 # policy_max_scale=1.0 → policy trains FULL speed after the
                                 # 250k warmup + 250k ramp. This is the original transfer path
                                 # that produced the first walker, minus only the crippling part.
  resume_policy_scale: 1.0       # For resuming from a walking model (not standing transfer).
                                 # No scaling needed — clip_fraction=0 at 0.8 means massive headroom.
                                 # 0.8 and 0.5 both produced frozen policy (zero clipping).
  extra_vf_epochs: 7             # Extra VF-only gradient steps after each PPO train() call.
                                 # Full-batch (batch_size=24576) gives only 3 gradient steps per cycle.
                                 # Clipping only affects policy loss — VF loss is plain MSE. But with
                                 # only 3 steps, the VF can't keep up (EV declined 0.50 → 0.36 over 2M
                                 # steps). 7 extra epochs → 10 total VF steps per cycle. Previous
                                 # successful run had 36 VF steps (batch_size=2048, 12 minibatches × 3).

  # ========== VECNORMALIZE CONFIGURATION ==========

  normalize: true
  vecnormalize_clip_obs: 10.0
  vecnormalize_clip_reward: 10.0

  # ========== NETWORK ARCHITECTURE ==========
  
  policy_kwargs:
    net_arch:
      - pi: [512, 512, 256]
        vf: [512, 512, 256]
    activation_fn: SiLU
    ortho_init: true
  
  # ========== LOGGING & CHECKPOINTING ==========
  
  verbose: 1
  
  log_dir: data/logs/walking
  use_tensorboard: true
  
  # Evaluation
  n_eval_episodes: 5
  eval_freq: 100_000
  
  # Checkpointing
  save_freq: 10_000_000  # 2026-05-14: every 10M (was 250k) — storage budget, 30M run = 3 saves
  checkpoint_dir: data/checkpoints/walking
  checkpoint_prefix: walking
  
  # Model saving
  best_model_path: models/best_walking_model
  final_model_path: models/final_walking_model
  vecnormalize_path: models/vecnorm_walking.pkl
  
  # Success thresholds
  target_reward_threshold: 3000
  velocity_error_threshold: 0.5  
  
  # Early stopping
  early_stop:
    patience: 5
  
  # ========== REWARD FUNCTION COMPONENTS ==========
  # FIX: All rewards scaled down by 10x to bring episode rewards to ~500 (was ~5000)
  # This is CRITICAL for PPO stability - high rewards caused KL divergence explosion

  # Velocity tracking (Gaussian kernel) — DOMINANT SIGNAL
  reward_tracking_weight: 5.0     # Doubled: must be ≥2x survival rewards
  reward_tracking_bandwidth: 10.0  # FIX: 20.0 created near-binary reward (zero for error>0.15), causing high advantage variance and KL=32k. 10.0 gives smoother gradient.

  # Direction/progress bonus
  reward_direction_weight: 0.8    # FIX: Reduced from 8.0 (10x)

  # Stability rewards
  reward_height_weight: 0.3       # FIX: Reduced from 3.0 (10x)
  reward_upright_weight: 0.2      # FIX: Reduced from 2.0 (10x)
  reward_alive_weight: 0.05       # FIX: Reduced from 0.5 (10x)

  # Penalties (keep small)
  reward_action_penalty: 0.0003   # FIX: Reduced from 0.003 (10x)
  reward_jerk_penalty: 0.0        # Zeroed: penalizes gait changes, conflicts with walking
  reward_arm_posture_weight: 0.5  # Restored 2026-05-14 for walking rebuild. Curriculum stage
                                 # weights (line 185) multiply this base. Effective max ~0.5
                                 # at stage 4, well under tracking (5.0).
  arm_posture_deadzone: 0.3       # Radians — deviations within deadzone are FREE (allows natural arm swing)
  arm_penalty_cap: 1.5            # Per-step cap. If arms saturate at -cap every step (dead gradient), raise to 2.5.

  # Consistency reward
  reward_consistency_weight: 0.0  # Zeroed: noisy, creates conflicting advantages
  reward_consistency_window: 100
  # WandB logging 
  use_wandb: true
  wandb_project: humanoid_walking
  wandb_log_freq: 5000
  video_freq: 500000
  episode_print_freq: 5000


# ============================================================================
# MAZE NAVIGATION CONFIGURATION
# ============================================================================

maze:
  # ========== MAZE ENVIRONMENT ==========
  cell_size: 2.0              # World-space cell size (meters)
  wall_height: 2.5            # Wall height (meters, > humanoid 1.4m)
  goal_threshold: 0.5         # Distance to goal to count as reached (meters)
  max_episode_steps: 10000    # Max steps per episode

  # ========== OBSERVATION ==========
  nav_obs_type: "minimal"     # 6 dims: goal_dx, goal_dy, goal_dist, goal_angle, wall_front, wall_left

  # ========== TRAINING MODE ==========
  hierarchical: true          # true=freeze walking, train nav; false=end-to-end
  walking_model_path: "models/walking/best/model.zip"
  walking_vecnorm_path: "models/walking/best/vecnorm.pkl"

  # ========== PPO HYPERPARAMETERS ==========
  total_timesteps: 50_000_000
  n_envs: 8
  learning_rate: 0.0003
  final_learning_rate: 0.00005
  batch_size: 256
  n_steps: 2048
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  seed: 42

  # ========== CURRICULUM ==========
  curriculum_start_stage: 0
  curriculum_max_stage: 6
  curriculum_window_size: 30
  curriculum_success_rate: 0.40

  # ========== LOGGING ==========
  use_wandb: false
  wandb_project: humanoid_maze
  log_dir: data/logs/maze
