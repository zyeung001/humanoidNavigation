# IMU mounting calibration for the real robot.
# axis_remap maps raw IMU sensor axes -> the PELVIS/base frame:
#     proj_grav = axis_remap @ (-accel_normalized)
#     ang_vel   = axis_remap @ gyro_rads - gyro_bias
# Derived 2026-06-21 by calibrate_imu.py (3-pose gravity method).
# IMU mounted on the PELVIS/base block (obs frame), so no waist correction is needed.
axis_remap:
  - [0, 0, -1]
  - [0, -1, 0]
  - [-1, 0, 0]
