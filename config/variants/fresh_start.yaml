# Yaw fine-tuning v3: strong yaw signal, no arm penalty
#
# v1 failed: LR decayed to zero (clip_fraction=0)
# v2 failed: yaw_rate_weight=1.0 too weak (10% of reward signal),
#   arm penalty (-1.5/step) was 1.5x the max yaw reward (+1.0/step).
#   Model had no incentive to learn turning.
#
# Fixes:
#   - yaw_rate_weight: 3.0 (now 30-40% of reward signal)
#   - arm penalty: 0.0 (cosmetic — add back AFTER yaw works)
#   - max_yaw_rate: 1.0 (train for the full range maze needs)
#   - Constant LR (no decay)
#
# Run:
#   python scripts/train_walking.py \
#       --model models/walking/best/model.zip \
#       --vecnorm models/walking/best/vecnorm.pkl \
#       --override config/variants/fresh_start.yaml
walking:
  # ===== STRONG YAW =====
  include_yaw_rate: true
  yaw_rate_weight: 3.0            # Strong: ~30-40% of reward signal
  turn_in_place_prob: 0.10        # 10% TIP practice
  max_yaw_rate: 1.0               # Full range — maze needs this

  # ===== DISABLE ARM PENALTY (cosmetic, add back later) =====
  reward_arm_posture_weight: 0.0

  # ===== PPO (constant LR) =====
  learning_rate: 0.0001
  final_learning_rate: 0.0001     # No decay
  batch_size: 12288
  n_epochs: 3
  clip_range: 0.2
  final_clip_range: 0.2
  ent_coef: 0.01
  final_ent_coef: 0.01
  log_std_max: 0.5

  # ===== NO SCALING =====
  policy_max_scale: 1.0
  extra_vf_epochs: 0
  resume_policy_scale: 1.0

  # ===== CURRICULUM =====
  curriculum_max_speed_stages: [0.15, 0.3, 0.45, 0.45, 0.6]
  curriculum_start_stage: 0
  curriculum_max_stage: 3
